name: Deploy Campaign Monitor template staging to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "staging/**"
      - ".github/workflows/deploy-campaign-monitor-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "campaign-monitor-pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: staging

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
